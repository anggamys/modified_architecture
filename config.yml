M1:
  description: 'Baseline murni: IndoBERT-base + Linear Softmax (Tanpa Char, Tanpa CRF)'
  model_name: 'indobenchmark/indobert-base-p1'
  char_type: 'none'
  use_crf: false

M2:
  description: 'Ablasi 1: IndoBERT-base + CRF (Menambah otak sintaksis)'
  model_name: 'indobenchmark/indobert-base-p1'
  char_type: 'none'
  use_crf: true

M3:
  description: 'Ablasi 2: IndoBERT-base + Word-BiLSTM + CRF (Mengevaluasi pengolahan urutan kata secara hierarkis)'
  model_name: 'indobenchmark/indobert-base-p1'
  char_type: 'none'
  use_crf: true
  use_word_bilstm: true

M4:
  description: 'Proposed Awal: IndoBERT-base + Char-CNN + CRF (Arsitektur V1)'
  model_name: 'indobenchmark/indobert-base-p1'
  char_type: 'cnn'
  use_crf: true

M5:
  description: 'Optimasi Morfologi: IndoBERT-base + Char-BiLSTM + CRF (Arsitektur V2)'
  model_name: 'indobenchmark/indobert-base-p1'
  char_type: 'bilstm'
  use_crf: true

M6:
  description: 'Domain Adaptation: IndoBERTweet + Char-BiLSTM + CRF (Arsitektur V3 Final)'
  model_name: 'dafqi/IndoBertTweet'
  char_type: 'bilstm'
  use_crf: true

# ─── Skenario Kontrol Ablasi (Merespons Critique 4: Konfusio Konfigurasional) ───
# Dua skenario ini ditambahkan untuk mengisolasi kontribusi encoder (IndoBERTweet)
# dan character extractor (BiLSTM vs CNN) secara independen.

M6a:
  description: 'Kontrol Ablasi: IndoBERTweet + Char-CNN + CRF (Isolasi encoder vs M4; isolasi char-extractor vs M6)'
  model_name: 'dafqi/IndoBertTweet'
  char_type: 'cnn'
  use_crf: true

M6b:
  description: 'Kontrol Ablasi: IndoBERTweet + Tanpa Char + CRF (Isolasi efek char-level features pada IndoBERTweet)'
  model_name: 'dafqi/IndoBertTweet'
  char_type: 'none'
  use_crf: true
